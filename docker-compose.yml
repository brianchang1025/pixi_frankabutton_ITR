services:

  franka_buttons:
    image: franka_buttons
    build:
      context: .
      dockerfile: ./Dockerfile

    container_name: franka_buttons_record

    network_mode: "host"

    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-100}

    env_file:
      # Important: you need to create the .env file using the Franka Desk credentials, see the README for more information
      - ~/.env

    command: ros2 launch franka_buttons button_to_record_msg.launch.py

